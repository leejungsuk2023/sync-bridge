appId: com.syncbridge.desktop
productName: SyncBridge
directories:
  output: release
  buildResources: build
files:
  - "**/*"
  - "!src"
  - "!src/**/*"
  - "!.env"
  - "!.gitignore"
  - "!*.md"
  - "!*.yml"
extraFiles:
  - from: "electron"
    to: "electron"
  - from: "dist"
    to: "dist"
  - from: "public/icons"
    to: "public/icons"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icons/icon512.png
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SyncBridge
  deleteAppDataOnUninstall: true
  runAfterFinish: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/icons/icon512.png
  category: public.app-category.business
publish:
  provider: github
  releaseType: release
